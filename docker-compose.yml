services:
  opensearch:
    image: opensearchproject/opensearch:3.5.0
    container_name: opensearch-node
    restart: unless-stopped
    environment:
      - cluster.name=tfm-soc-cluster
      - node.name=tfm-node-1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1024m -Xmx1024m
      # Configuración de laboratorio / pruebas para simplificar el despliegue reproducible del TFM.
      # No representa una configuración endurecida de producción.
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q 'cluster_name' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    container_name: opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      # Configuración de laboratorio / pruebas.
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfm-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - MODEL_PATH=/app/src/ml_model.joblib
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-u", "src/app.py"]

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tfm-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
    depends_on:
      opensearch:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["python", "-u", "src/worker_llm.py"]

volumes:
  opensearch-data:
    driver: local
